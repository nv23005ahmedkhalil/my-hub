server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/plain;

    # HTML: never cache aggressively, so link edits show up right away
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS/SVG/images: cache briefly, easy to bump by redeploying
    location ~* \.(css|js|svg|jpg|jpeg|png|webp)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
